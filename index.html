<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dead Zone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #eee;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
  }

  /* ── Start screen ── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 2rem;
    padding: 2rem;
  }

  #game-title {
    font-size: 3.5rem;
    font-weight: 900;
    color: #c00;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
  }

  #start-btn {
    font-size: 2rem;
    padding: 1.2rem 3rem;
    background: #c00;
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    min-width: 220px;
    -webkit-tap-highlight-color: transparent;
  }

  #start-instructions {
    font-size: 1rem;
    color: #888;
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }

  /* ── Game screen ── */
  #game-screen {
    display: none;
    height: 100vh;
    position: relative;
  }

  #exit-btn {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 8px;
    font-size: 0.9rem;
    padding: 0.5rem 1rem;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #status-msg {
    position: absolute;
    top: 100px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 1.1rem;
    color: #888;
    pointer-events: none;
  }

  #hud {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    line-height: 1.8;
  }

  #ammo-display { font-size: 1.4rem; color: #ff0; }
  #score-display { font-size: 1.1rem; color: #aaa; }
  #zombie-count  { font-size: 1rem;   color: #c66; }

  /* Full-screen tap target */
  #tap-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    cursor: crosshair;
  }

  #tap-hint {
    font-size: 1rem;
    color: #444;
    text-align: center;
    line-height: 1.8;
    pointer-events: none;
  }

  #feedback {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #ff0;
    pointer-events: none;
    min-height: 2.5rem;
    transition: opacity 0.3s;
  }

  /* Visually hidden - VO reads it, sighted users don't see it */
  #vo-alert {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    color: #111;       /* same as background */
    background: #111;
    font-size: 1px;
  }
</style>
</head>
<body>

<!-- ── Start screen ── -->
<div id="start-screen">
  <h1 id="game-title">Dead Zone</h1>
  <button id="start-btn">Start Game</button>
  <p id="start-instructions">
    Turn your phone to face the zombies.<br>
    Tap to shoot &bull; Hold for rapid fire<br>
    Double-tap to reload &bull; Triple-tap to exit
  </p>
</div>

<!-- ── Game screen ── -->
<div id="game-screen" aria-label="Dead Zone game in progress">
  <div id="hud" aria-hidden="true">
    <div id="ammo-display">Ammo: 6</div>
    <div id="score-display">Score: 0</div>
    <div id="zombie-count">Zombies: 0</div>
  </div>

  <div id="status-msg"></div>

  <div id="tap-area">
    <div id="tap-hint">
      Tap &nbsp;&mdash; shoot<br>
      Hold &mdash; rapid fire<br>
      2&times; tap &mdash; reload<br>
      3&times; tap &mdash; exit
    </div>
  </div>

  <div id="feedback" aria-live="polite" aria-atomic="true"></div>

  <button id="exit-btn">Exit game</button>

  <!-- VoiceOver alert: invisible to sighted users, announced immediately by VO -->
  <div id="vo-alert" aria-live="assertive" aria-atomic="true"></div>
</div>

<script>
'use strict';

// ── Audio context (created on user gesture) ────────────────────
let audioCtx = null;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ── Audio file loading ─────────────────────────────────────────
const audioBuffers = {};

async function loadSounds() {
  const files = {
    gunshot:      'sounds/gunshot.mp3',
    zombieHit:    'sounds/zombie_hit2.ogg',
    zombieDeath:  'sounds/zombie_death.ogg',
    groan1:       'sounds/groan1.mp3',
    groan2:       'sounds/groan2.mp3',
    groan3:       'sounds/groan3.mp3',
    groan4:       'sounds/groan4.mp3',
    groan5:       'sounds/groan5.mp3',
    bodyHitA:     'sounds/body_hit_a.mp3',
    bodyHitB:     'sounds/body_hit_b.mp3',
    bodyHitC:     'sounds/body_hit_c.mp3',
    reloadClick:  'sounds/reload_click.ogg',
    reloadLatch:  'sounds/reload_latch.ogg',
  };
  await Promise.all(Object.entries(files).map(async ([key, path]) => {
    try {
      const resp = await fetch(path);
      const raw  = await resp.arrayBuffer();
      let buf = await ctx().decodeAudioData(raw);
      // Sum stereo to mono so the panner treats it as a true point source
      if (buf.numberOfChannels > 1) {
        const mono = ctx().createBuffer(1, buf.length, buf.sampleRate);
        const out  = mono.getChannelData(0);
        for (let ch = 0; ch < buf.numberOfChannels; ch++) {
          const src = buf.getChannelData(ch);
          for (let i = 0; i < buf.length; i++) out[i] += src[i] / buf.numberOfChannels;
        }
        buf = mono;
      }
      audioBuffers[key] = buf;
    } catch (e) { /* fall back to synthesised if file missing */ }
  }));
}

function playBuffer(key, destination, volume = 1) {
  if (!audioBuffers[key]) return false;
  const src  = ctx().createBufferSource();
  src.buffer = audioBuffers[key];
  const gain = ctx().createGain();
  gain.gain.value = volume;
  src.connect(gain);
  gain.connect(destination || ctx().destination);
  src.start();
  return true;
}

// ── Distortion curve helper ────────────────────────────────────
function makeDistCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

// ── Spatial panner ─────────────────────────────────────────────
function createPanner() {
  const p = ctx().createPanner();
  p.panningModel  = 'equalpower';  // HRTF silently fails on iOS Safari
  p.distanceModel = 'inverse';
  p.refDistance   = 1;
  p.maxDistance   = 25;
  p.rolloffFactor = 1.2;
  p.connect(ctx().destination);
  return p;
}

function setPannerPos(panner, relDeg, distance) {
  const rad = (relDeg * Math.PI) / 180;
  const t   = ctx().currentTime;
  panner.positionX.setValueAtTime( Math.sin(rad) * distance, t);
  panner.positionY.setValueAtTime( 0,                        t);
  panner.positionZ.setValueAtTime(-Math.cos(rad) * distance, t);
}

function updateZombieAudio(z, relDeg) {
  setPannerPos(z.panner, relDeg, z.distance);
  const t   = ctx().currentTime;
  const wet = Math.min(0.7, calcAngleReverb(relDeg) + calcDistanceReverb(z.distance));
  z.growl.spatialFilt.frequency.setValueAtTime(calcSpatialCutoff(relDeg), t);
  z.growl.reverbGain.gain.setValueAtTime(wet, t);
  z.growl.dirGain.gain.setValueAtTime(calcDirGain(relDeg, z.distance), t);
}

// ── Sound: gunshot ─────────────────────────────────────────────
function playGunshot() {
  if (playBuffer('gunshot', null, 5.0)) return;
  // Synthesised fallback
  const c   = ctx();
  const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
  }
  const src  = c.createBufferSource();
  src.buffer = buf;
  const gain = c.createGain();
  gain.gain.setValueAtTime(2.5, c.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
  const filt = c.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 900;
  filt.Q.value = 0.4;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(c.destination);
  src.start();
}

// ── Sound: empty click ─────────────────────────────────────────
function playDryFire() {
  const c    = ctx();
  const osc  = c.createOscillator();
  osc.type   = 'square';
  osc.frequency.value = 1800;
  const gain = c.createGain();
  gain.gain.setValueAtTime(0.3, c.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
  osc.connect(gain);
  gain.connect(c.destination);
  osc.start();
  osc.stop(c.currentTime + 0.04);
}

// ── Sound: reload ──────────────────────────────────────────────
function playReloadSound() {
  const c = ctx();
  // Real sounds: click then latch
  if (audioBuffers.reloadClick && audioBuffers.reloadLatch) {
    const s1 = c.createBufferSource(); s1.buffer = audioBuffers.reloadClick;
    const s2 = c.createBufferSource(); s2.buffer = audioBuffers.reloadLatch;
    const rg = c.createGain(); rg.gain.value = 5.0;
    rg.connect(c.destination);
    s1.connect(rg); s2.connect(rg);
    s1.start(c.currentTime);
    s2.start(c.currentTime + 0.35);
    return;
  }
  // Synthesised fallback
  [0, 0.18, 0.55].forEach((t, i) => {
    const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
    const d   = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) {
      d[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / d.length, 4);
    }
    const src  = c.createBufferSource();
    src.buffer = buf;
    const gain = c.createGain();
    gain.gain.value = 1.2 + i * 0.3;
    src.connect(gain);
    gain.connect(c.destination);
    src.start(c.currentTime + t);
  });
}

// ── Spatial cues: low-pass filter + reverb wet level ──────────
function calcSpatialCutoff(relDeg) {
  const rad = (relDeg * Math.PI) / 180;
  const t   = (1 - Math.cos(rad)) / 2; // 0 = front, 1 = back
  return 18000 - 17700 * t;            // 18000 Hz front → 300 Hz back (very muffled)
}

function calcAngleReverb(relDeg) {
  const rad = (relDeg * Math.PI) / 180;
  const t   = (1 - Math.cos(rad)) / 2; // 0 = front, 1 = back
  return 0.4 * t;                      // 0 = dry front, 0.4 = echoed back
}

function calcDistanceReverb(distance) {
  const t = Math.max(0, Math.min(1, (distance - 2) / 16));
  return 0.35 * t;
}

// dirGain combines rear attenuation and close-proximity boost.
// Applied via a dedicated gain node so stopGrowl fade-out is unaffected.
function calcDirGain(relDeg, distance) {
  // Rear attenuation: sounds directly behind are 75% quieter than front
  const rad      = (relDeg * Math.PI) / 180;
  const rearT    = (1 - Math.cos(rad)) / 2;          // 0 = front, 1 = back
  const rearAtten = 1.0 - 0.75 * rearT;              // 1.0 front → 0.25 back

  // Close boost: zombie within 4 units sounds dramatically louder
  const closeT   = Math.max(0, Math.min(1, (8 - distance) / 6.5));
  const closeBoost = 1.0 + 3.5 * closeT;             // 1.0 at distance 8+ → 4.5 at distance 1.5

  return Math.min(rearAtten * closeBoost, 4.0);
}

function pitchToRate(pitch) {
  if (pitch >= 160) return 1.4;
  if (pitch >= 90)  return 1.0;
  return 0.65;
}

// Each zombie has its own dedicated sound file, looped with a natural pause.
function startGrowl(panner, soundKey, pitch) {
  const c    = ctx();
  const gain = c.createGain();
  gain.gain.value = 0.9;

  const spatialFilt = c.createBiquadFilter();
  spatialFilt.type  = 'lowpass';
  spatialFilt.frequency.value = 18000;
  spatialFilt.Q.value = 0.7;

  const delay      = c.createDelay(0.1);
  delay.delayTime.value = 0.028;
  const reverbGain = c.createGain();
  reverbGain.gain.value = 0;

  const dirGain = c.createGain();
  dirGain.gain.value = 1.0;

  gain.connect(dirGain);
  dirGain.connect(spatialFilt);
  dirGain.connect(delay);
  delay.connect(reverbGain);
  reverbGain.connect(spatialFilt);
  spatialFilt.connect(panner);

  let stopped    = false;
  let currentSrc = null;

  function playLoop() {
    if (stopped) return;
    if (audioBuffers[soundKey]) {
      currentSrc        = c.createBufferSource();
      currentSrc.buffer = audioBuffers[soundKey];
      currentSrc.connect(gain);
      currentSrc.start();
      currentSrc.onended = () => {
        currentSrc = null;
        if (!stopped) setTimeout(playLoop, 1200 + Math.random() * 2000);
      };
    } else {
      // Synthesised fallback - oscillator runs until stopped
      const osc  = c.createOscillator();
      osc.type   = 'sawtooth';
      osc.frequency.value = pitch;
      const filt = c.createBiquadFilter();
      filt.type  = 'lowpass';
      filt.frequency.value = Math.min(pitch * 3, 700);
      const dist = c.createWaveShaper();
      dist.curve = makeDistCurve(150);
      osc.connect(filt); filt.connect(dist); dist.connect(gain);
      osc.start();
      currentSrc = osc;
    }
  }

  playLoop();

  return {
    gain, dirGain, spatialFilt, reverbGain,
    stop() {
      stopped = true;
      if (currentSrc) { try { currentSrc.stop(); } catch(e) {} }
    }
  };
}

function stopGrowl(growl) {
  growl.stop();
  const t = ctx().currentTime;
  growl.gain.gain.setValueAtTime(growl.gain.gain.value, t);
  growl.gain.gain.linearRampToValueAtTime(0, t + 0.3);
}

// ── Sound: zombie hit ──────────────────────────────────────────
function playHit(panner) {
  const c = ctx();

  // Always play a sharp synthesised crack so the hit is never missed
  const noise = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
  const nd    = noise.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / nd.length, 2);
  const crackSrc  = c.createBufferSource();
  crackSrc.buffer = noise;
  const crackGain = c.createGain();
  crackGain.gain.setValueAtTime(3.5, c.currentTime);
  crackGain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
  crackSrc.connect(crackGain);
  crackGain.connect(panner);
  crackSrc.start();

  // Layer the organic hit file on top at high volume
  if (audioBuffers.zombieHit) {
    const src  = c.createBufferSource();
    src.buffer = audioBuffers.zombieHit;
    const gain = c.createGain();
    gain.gain.value = 3.5;
    src.connect(gain);
    gain.connect(panner);
    src.start();
  }
}

// ── Sound: bullet hit thud (non-lethal) ───────────────────────
function playHitThud() {
  const c   = ctx();
  const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.12), c.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++)
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8);
  const src  = c.createBufferSource();
  src.buffer = buf;
  const lp = c.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 180;
  const gain = c.createGain();
  gain.gain.setValueAtTime(3.0, c.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
  src.connect(lp); lp.connect(gain); gain.connect(c.destination);
  src.start();
}

// ── Sound: zombie death ────────────────────────────────────────
function playBodyHit(distance) {
  const candidates = ['bodyHitA', 'bodyHitB', 'bodyHitC'].filter(k => audioBuffers[k]);
  if (!candidates.length) return;
  const key = candidates[Math.floor(Math.random() * candidates.length)];
  const c   = ctx();
  const src = c.createBufferSource();
  src.buffer = audioBuffers[key];
  // Distinct playback rate per file so the three sounds are clearly different
  src.playbackRate.value = key === 'bodyHitA' ? 1.0
                         : key === 'bodyHitB' ? 0.82
                         :                     1.18;
  const gain = c.createGain();
  // Close (distance ~2) = full volume; far (distance ~18) = much quieter; no floor
  const distVol = Math.min(1, 2.5 / Math.max(distance, 1));
  gain.gain.value = 2.5 * distVol;
  src.connect(gain);
  gain.connect(c.destination);
  src.start();
}

function playDeath(panner, pitch, distance) {
  // Zombie death cry through the spatial panner
  if (audioBuffers.zombieDeath) {
    const src  = ctx().createBufferSource();
    src.buffer = audioBuffers.zombieDeath;
    src.playbackRate.value = pitchToRate(pitch);
    const gain = ctx().createGain();
    gain.gain.value = 1.5;
    src.connect(gain);
    gain.connect(panner);
    src.start();
  } else {
    // Synthesised fallback
    const c   = ctx();
    const osc = c.createOscillator();
    osc.type  = 'sawtooth';
    osc.frequency.setValueAtTime(pitch,           c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(pitch * 0.2, c.currentTime + 1.0);
    const dist = c.createWaveShaper();
    dist.curve = makeDistCurve(400);
    const gain = c.createGain();
    gain.gain.setValueAtTime(1.8,  c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 1.0);
    osc.connect(dist); dist.connect(gain); gain.connect(panner);
    osc.start(); osc.stop(c.currentTime + 1.05);
  }
  // Body hits the floor ~400 ms after the death cry starts
  setTimeout(() => playBodyHit(distance || 5), 400);
}

// ── Sound: game-over sting ─────────────────────────────────────
function playGameOverSting() {
  const c = ctx();
  [220, 185, 147, 110].forEach((freq, i) => {
    const osc  = c.createOscillator();
    osc.type   = 'sawtooth';
    osc.frequency.value = freq;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.6, c.currentTime + i * 0.22);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.22 + 0.5);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(c.currentTime + i * 0.22);
    osc.stop(c.currentTime  + i * 0.22 + 0.55);
  });
}

// ── Speech: "Entering the zone" placeholder ────────────────────
function speakIntro(onDone) {
  if (!window.speechSynthesis) { onDone(); return; }
  window.speechSynthesis.cancel();
  const utt   = new SpeechSynthesisUtterance('Entering the zone. Stay alert.');
  utt.rate    = 0.75;
  utt.pitch   = 0.3;
  utt.volume  = 1;
  // Fallback timer in case onend never fires (iOS quirk)
  let called = false;
  const fallback = setTimeout(() => { if (!called) { called = true; onDone(); } }, 4000);
  utt.onend   = () => { if (!called) { called = true; clearTimeout(fallback); onDone(); } };
  utt.onerror = () => { if (!called) { called = true; clearTimeout(fallback); onDone(); } };
  window.speechSynthesis.speak(utt);
}

function speakGameOver(score) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt  = new SpeechSynthesisUtterance(`Game over. You took down ${score} zombie${score !== 1 ? 's' : ''}.`);
  utt.rate   = 0.8;
  utt.pitch  = 0.4;
  utt.volume = 1;
  window.speechSynthesis.speak(utt);
}

// ── Ambient fixed-position sounds ─────────────────────────────
// Three anchors at fixed world angles help the player calibrate orientation.
const AMBIENT_SOURCES = [
  { angle: 60,  label: 'beep',  type: 'beep' },
  { angle: 200, label: 'drip',  type: 'drip' },
  { angle: 330, label: 'hum',   type: 'hum'  },
];
let ambientNodes = [];

function startAmbient() {
  AMBIENT_SOURCES.forEach(src => {
    const panner = createPanner();
    const relDeg = ((src.angle - playerHeading) + 360) % 360;
    setPannerPos(panner, relDeg, 8); // fixed distance

    if (src.type === 'hum') {
      // Continuous low electrical hum
      const c   = ctx();
      const osc = c.createOscillator();
      osc.type  = 'sine';
      osc.frequency.value = 55;
      const osc2 = c.createOscillator();
      osc2.type  = 'sine';
      osc2.frequency.value = 110;
      const gain = c.createGain();
      gain.gain.value = 0.12;
      osc.connect(gain); osc2.connect(gain);
      gain.connect(panner);
      osc.start(); osc2.start();
      ambientNodes.push({ panner, worldAngle: src.angle, nodes: [osc, osc2, gain] });

    } else if (src.type === 'beep') {
      // Periodic electronic beep
      const gain = ctx().createGain();
      gain.gain.value = 0.18;
      gain.connect(panner);
      function doBeep() {
        if (!gameRunning) return;
        const c   = ctx();
        const osc = c.createOscillator();
        osc.type  = 'sine';
        osc.frequency.value = 880;
        const g2  = c.createGain();
        g2.gain.setValueAtTime(1, c.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
        osc.connect(g2); g2.connect(gain);
        osc.start(); osc.stop(c.currentTime + 0.15);
        const node = { panner, worldAngle: src.angle, nodes: [gain], timer: setTimeout(doBeep, 1800 + Math.random() * 600) };
        ambientNodes.push(node);
      }
      const beepNode = { panner, worldAngle: src.angle, nodes: [gain], timer: setTimeout(doBeep, 800) };
      ambientNodes.push(beepNode);

    } else if (src.type === 'drip') {
      // Periodic water drip
      const gain = ctx().createGain();
      gain.gain.value = 0.22;
      gain.connect(panner);
      function doDrip() {
        if (!gameRunning) return;
        const c   = ctx();
        const osc = c.createOscillator();
        osc.type  = 'sine';
        osc.frequency.setValueAtTime(1200, c.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, c.currentTime + 0.18);
        const g2  = c.createGain();
        g2.gain.setValueAtTime(1, c.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.2);
        osc.connect(g2); g2.connect(gain);
        osc.start(); osc.stop(c.currentTime + 0.22);
        setTimeout(doDrip, 2400 + Math.random() * 1200);
      }
      const dripNode = { panner, worldAngle: src.angle, nodes: [gain], timer: setTimeout(doDrip, 1200) };
      ambientNodes.push(dripNode);
    }
  });
}

function stopAmbient() {
  ambientNodes.forEach(n => {
    clearTimeout(n.timer);
    n.nodes.forEach(nd => { try { if (nd.stop) nd.stop(); nd.disconnect(); } catch(e){} });
    n.panner.disconnect();
  });
  ambientNodes = [];
}

function updateAmbientPanners() {
  // Called from onOrientation - update panner positions for fixed world angles
  const seen = new Set();
  ambientNodes.forEach(n => {
    if (seen.has(n.worldAngle)) return;
    seen.add(n.worldAngle);
    const rel = ((n.worldAngle - playerHeading) + 360) % 360;
    setPannerPos(n.panner, rel, 8);
  });
}

// ── Zombie types ───────────────────────────────────────────────
const ZOMBIE_TYPES = [
  { soundKey: 'groan1', pitch: 185, hp: 1 },
  { soundKey: 'groan2', pitch: 110, hp: 2 },
  { soundKey: 'groan3', pitch:  90, hp: 2 },
  { soundKey: 'groan4', pitch:  62, hp: 3 },
  { soundKey: 'groan5', pitch:  75, hp: 2 },
];

let lastZombieTypeIndex = -1;

// ── Game state ─────────────────────────────────────────────────
const MAX_AMMO  = 6;
const AIM_WIDTH = 55;    // degrees either side counts as "in sights"

// Round determines max zombies: round 1 = 1, round 2 = 2, round 3+ = 3
function maxZombiesForRound(r) { return Math.min(r, 3); }

let playerHeading    = 0;
let gyroHeading      = 0;
let lastMotionMs     = 0;
let compassReady     = false;
let sensorsAdded     = false;
let zombies          = [];
let ammo             = MAX_AMMO;
let score            = 0;
let round            = 1;
let killsThisRound   = 0;
let gameRunning      = false;
let advanceTimer     = null;
let beeperTimeout    = null;

// ── Spawn zombie ───────────────────────────────────────────────
function spawnZombie() {
  if (!gameRunning || zombies.length >= maxZombiesForRound(round)) return;

  const available = ZOMBIE_TYPES.filter((_, i) => i !== lastZombieTypeIndex);
  const typeIdx   = ZOMBIE_TYPES.indexOf(available[Math.floor(Math.random() * available.length)]);
  lastZombieTypeIndex = typeIdx;
  const type      = ZOMBIE_TYPES[typeIdx];
  const angle    = Math.random() * 360;
  const distance = 12 + Math.random() * 6;
  const panner   = createPanner();
  setPannerPos(panner, (angle - playerHeading + 360) % 360, distance);

  const growl = startGrowl(panner, type.soundKey, type.pitch);

  const z = {
    id:       Math.random(),
    angle,
    distance,
    hp:       type.hp,
    pitch:    type.pitch,
    panner,
    growl,
  };

  zombies.push(z);
  setTimeout(() => scheduleGrunt(z), 800 + Math.random() * 800);
  updateHUD();
}

function removeZombie(z) {
  if (z.gruntTimer) clearTimeout(z.gruntTimer);
  stopGrowl(z.growl);
  z.panner.disconnect();
  zombies = zombies.filter(x => x.id !== z.id);
  updateHUD();
}

// ── Rhythmic grunt transients ──────────────────────────────────
// A sharp bandpass noise burst every 1.5-2.5 s gives the brain
// a transient onset to lock direction onto, unlike a continuous drone.
function scheduleGrunt(z) {
  if (!gameRunning || !zombies.find(x => x.id === z.id)) return;
  const c   = ctx();
  const dur = 0.14;
  const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++)
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);

  const src = c.createBufferSource();
  src.buffer = buf;
  const bp1 = c.createBiquadFilter();
  bp1.type = 'bandpass'; bp1.frequency.value = z.pitch; bp1.Q.value = 3;
  const bp2 = c.createBiquadFilter();
  bp2.type = 'bandpass'; bp2.frequency.value = z.pitch * 2.5; bp2.Q.value = 2;
  const g = c.createGain();
  g.gain.value = 2.2;
  src.connect(bp1); bp1.connect(g);
  src.connect(bp2); bp2.connect(g);
  g.connect(z.panner);
  src.start();

  z.gruntTimer = setTimeout(() => scheduleGrunt(z), 1500 + Math.random() * 1200);
}

// ── Target detector beeper ─────────────────────────────────────
// Plays through the main output (not spatialized) — it's the gun's
// sensor, not the zombie. Beeps fast when aimed at a zombie.
// Ranging beep: clean sine ping, punchy attack, short tail
function playTargetTick(vol) {
  const c   = ctx();
  const osc = c.createOscillator();
  osc.type  = 'sine';
  osc.frequency.value = 1450;
  const g = c.createGain();
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);
  osc.connect(g); g.connect(c.destination);
  osc.start(); osc.stop(c.currentTime + 0.06);
}

// Lock-on beep: slightly higher sine ping, fired rapidly
function playLockBeep() {
  const c   = ctx();
  const osc = c.createOscillator();
  osc.type  = 'sine';
  osc.frequency.value = 2000;
  const g = c.createGain();
  g.gain.setValueAtTime(0.55, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
  osc.connect(g); g.connect(c.destination);
  osc.start(); osc.stop(c.currentTime + 0.05);
}

function runBeeper() {
  if (!gameRunning) return;
  // Only track the nearest zombie to avoid confusion with multiple targets
  let minDiff = 180;
  zombies.forEach(z => {
    const rel  = ((z.angle - playerHeading) + 360) % 360;
    const diff = rel > 180 ? 360 - rel : rel;
    if (diff < minDiff) minDiff = diff;
  });

  const LOCK_DEG = 20;   // rapid lock-on beeps within this arc
  const RANGE    = 140;  // ranging beeps active up to this arc
  let interval;

  if (zombies.length === 0 || minDiff >= RANGE) {
    interval = 2200;  // nothing in range - stay quiet
  } else if (minDiff < LOCK_DEG) {
    playLockBeep();
    interval = 80;    // ~12 beeps/sec - rapid locked-on pulse
  } else {
    const t  = (minDiff - LOCK_DEG) / (RANGE - LOCK_DEG); // 0 at lock edge, 1 at range edge
    interval = 150 + t * 1400;                              // 150 ms → 1550 ms
    const vol = 0.2 + (1 - t) * 0.6;
    playTargetTick(vol);
  }
  beeperTimeout = setTimeout(runBeeper, interval);
}

function startBeeper() { stopBeeper(); runBeeper(); }
function stopBeeper()  { if (beeperTimeout) { clearTimeout(beeperTimeout); beeperTimeout = null; } }

// ── Device orientation + gyro fusion ──────────────────────────
// Compass (alpha) is accurate but lag-smoothed by iOS.
// Gyroscope (rotationRate) is near-instant but drifts.
// Strategy: integrate gyro for fast response; nudge it toward compass each tick.

function applyHeading() {
  zombies.forEach(z => {
    const rel = ((z.angle - playerHeading) + 360) % 360;
    updateZombieAudio(z, rel);
  });
  updateAmbientPanners();
}

function onOrientation(e) {
  if (e.alpha === null) return;
  if (!compassReady) {
    gyroHeading   = e.alpha;
    playerHeading = e.alpha;
    compassReady  = true;
  } else {
    // Gently pull gyro toward compass to correct drift (8% per compass update)
    let diff = e.alpha - gyroHeading;
    if (diff >  180) diff -= 360;
    if (diff < -180) diff += 360;
    gyroHeading = (gyroHeading + diff * 0.08 + 360) % 360;
  }
}

function onMotion(e) {
  if (!compassReady || !e.rotationRate) return;
  const now = performance.now();
  if (lastMotionMs > 0) {
    const dt = (now - lastMotionMs) / 1000;
    // On iOS portrait: clockwise rotation increases compass heading;
    // rotationRate.alpha is negative for clockwise, so negate to match.
    gyroHeading   = (gyroHeading - e.rotationRate.alpha * dt + 360) % 360;
    playerHeading = gyroHeading;
    applyHeading();
  }
  lastMotionMs = now;
}


// ── Game loop: zombies advance ─────────────────────────────────
function tick() {
  if (!gameRunning) return;
  zombies.forEach(z => {
    z.distance -= 0.12;
    const rel = ((z.angle - playerHeading) + 360) % 360;
    updateZombieAudio(z, rel);
    if (z.distance <= 1.2) triggerGameOver();
  });
}

// ── Shooting logic ─────────────────────────────────────────────
function getTarget() {
  let best = null, bestDiff = Infinity;
  zombies.forEach(z => {
    let rel  = ((z.angle - playerHeading) + 360) % 360;
    let diff = rel > 180 ? 360 - rel : rel;
    if (diff < AIM_WIDTH && diff < bestDiff) { bestDiff = diff; best = z; }
  });
  return best;
}

function shoot() {
  if (!gameRunning) return;
  if (ammo <= 0) { playDryFire(); showFeedback('No ammo - reload!'); return; }
  ammo--;
  updateHUD();
  playGunshot();
  const t = getTarget();
  if (t) {
    t.hp--;
    if (t.hp <= 0) {
      playDeath(t.panner, t.pitch, t.distance);
      score++;
      killsThisRound++;
      showFeedback('Zombie down!');
      removeZombie(t);
      // Advance round after killing enough zombies (3 per round)
      if (killsThisRound >= 3 && round < 3) {
        round++;
        killsThisRound = 0;
        showFeedback(`Round ${round}!`);
      }
      setTimeout(() => { if (gameRunning) spawnZombie(); }, 1000 + Math.random() * 1000);
    } else {
      playHitThud();
      showFeedback('Hit!');
    }
  } else {
    showFeedback('Miss');
  }
  updateHUD();
}

function doReload() {
  if (!gameRunning) return;
  showFeedback('Reloading...');
  playReloadSound();
  setTimeout(() => {
    ammo = MAX_AMMO;
    updateHUD();
    showFeedback('Ready!');
  }, 900);
}

// ── Tap / hold / multi-tap detection ──────────────────────────
const HOLD_MS       = 280;   // ms before hold fires
const TAP_MAX_MS    = 250;   // max touch duration to count as tap
const MULTI_WIN_MS  = 380;   // window to count a second/third tap

let touchStart      = 0;
let holdTimer       = null;
let rapidTimer      = null;
let tapCount        = 0;
let multiTimer      = null;

function onTouchStart(e) {
  e.preventDefault();
  touchStart = Date.now();
  holdTimer  = setTimeout(() => {
    holdTimer  = null;
    rapidTimer = setInterval(shoot, 260);
  }, HOLD_MS);
}

function onTouchEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  holdTimer = null;

  if (rapidTimer) {
    clearInterval(rapidTimer);
    rapidTimer = null;
    return;  // hold gesture handled - don't also count as tap
  }

  if (Date.now() - touchStart > TAP_MAX_MS) return; // slow press, ignore

  tapCount++;
  clearTimeout(multiTimer);

  if (tapCount >= 3) {
    tapCount = 0;
    triggerExit();
    return;
  }

  multiTimer = setTimeout(() => {
    const n  = tapCount;
    tapCount = 0;
    if      (n === 1) shoot();
    else if (n === 2) doReload();
  }, MULTI_WIN_MS);
}

// ── UI helpers ─────────────────────────────────────────────────
let fbTimer = null;
function showFeedback(msg) {
  const el      = document.getElementById('feedback');
  el.textContent = msg;
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => { el.textContent = ''; }, 1600);
}

function updateHUD() {
  document.getElementById('ammo-display').textContent  = `Ammo: ${ammo}`;
  document.getElementById('score-display').textContent = `Score: ${score}  |  Round: ${round}`;
  document.getElementById('zombie-count').textContent  = `Zombies: ${zombies.length}`;
}

// ── Status helper (visible on screen during startup) ──────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ── Game start / end ───────────────────────────────────────────
function onStartPressed() {
  // Must do ALL permission requests synchronously in the user gesture handler.

  // 1. Wake / create AudioContext immediately, then play a silent buffer
  //    to fully unlock iOS audio in the same gesture.
  const c = ctx();
  c.resume().then(() => {
    const buf = c.createBuffer(1, 1, c.sampleRate);
    const src = c.createBufferSource();
    src.buffer = buf;
    src.connect(c.destination);
    src.start();
  });

  // 2. Request device orientation/motion permission (iOS 13+ requires this in a user gesture).
  //    One requestPermission call covers both deviceorientation and devicemotion on iOS.
  if (!sensorsAdded) {
    sensorsAdded = true;
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', onOrientation);
            window.addEventListener('devicemotion', onMotion);
          }
        })
        .catch(() => {});
    } else {
      window.addEventListener('deviceorientation', onOrientation);
      window.addEventListener('devicemotion', onMotion);
    }
  }

  // 3. Fire ARIA live region for VO users (invisible visually).
  const voEl = document.getElementById('vo-alert');
  voEl.textContent = '';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { voEl.textContent = 'Turn off VoiceOver now'; });
  });

  // 4. Switch screens immediately.
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'block';
  setStatus('Loading sounds…');

  // 5. Load audio files, then speak intro, then begin play.
  loadSounds()
    .catch(() => {})
    .then(() => { setStatus(''); speakIntro(beginPlay); });
}

function beginPlay() {
  setStatus('');
  gameRunning    = true;
  ammo           = MAX_AMMO;
  score          = 0;
  round          = 1;
  killsThisRound = 0;
  zombies        = [];
  updateHUD();

  startAmbient();
  startBeeper();

  spawnZombie();
  setTimeout(spawnZombie, 900);
  setTimeout(spawnZombie, 1800);

  advanceTimer = setInterval(tick, 200);
}

function triggerGameOver() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(advanceTimer);
  stopBeeper();
  zombies.forEach(z => {
    if (z.gruntTimer) clearTimeout(z.gruntTimer);
    stopGrowl(z.growl);
    z.panner.disconnect();
  });
  zombies = [];
  stopAmbient();

  playGameOverSting();
  showFeedback(`GAME OVER  |  Score: ${score}`);
  speakGameOver(score);

  setTimeout(() => {
    document.getElementById('game-screen').style.display  = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('feedback').textContent = '';
  }, 5000);
}

function triggerExit() {
  triggerGameOver();
}

// ── Wire up events ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', onStartPressed);
document.getElementById('exit-btn').addEventListener('click', triggerExit);

const tapArea = document.getElementById('tap-area');
tapArea.addEventListener('touchstart', onTouchStart, { passive: false });
tapArea.addEventListener('touchend',   onTouchEnd,   { passive: false });

// Desktop fallback (mouse)
tapArea.addEventListener('mousedown', () => onTouchStart({ preventDefault() {} }));
tapArea.addEventListener('mouseup',   () => onTouchEnd({ preventDefault() {} }));
</script>
</body>
